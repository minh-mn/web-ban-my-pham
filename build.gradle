plugins {
    id 'java'
    id 'war'
    id "org.hidetake.ssh" version "2.11.2"
}

group = 'com.webshop.app'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Servlet / JSP - Tomcat 10.1 dùng Jakarta
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    compileOnly 'jakarta.servlet.jsp:jakarta.servlet.jsp-api:3.1.1'

    // JSTL cho Jakarta EE / Tomcat 10
    implementation 'jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:3.0.0'
    implementation 'org.glassfish.web:jakarta.servlet.jsp.jstl:3.0.1'

    // MySQL JDBC
    implementation 'com.mysql:mysql-connector-j:9.1.0'

    // Mail
    implementation 'jakarta.mail:jakarta.mail-api:2.0.1'
    implementation 'com.sun.mail:jakarta.mail:2.0.1'
    implementation 'com.sun.activation:jakarta.activation:2.0.1'

    // BCrypt
    implementation 'org.mindrot:jbcrypt:0.4'

    // Google login
    implementation 'com.google.api-client:google-api-client:2.7.0'
    implementation 'com.google.oauth-client:google-oauth-client:1.36.0'
    implementation 'com.google.http-client:google-http-client-jackson2:1.45.0'

    // Facebook login
    implementation 'com.restfb:restfb:2023.10.0'

    // JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'

    // HTTP client
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Excel import/export - dùng cho nhập thêm hàng tồn kho
    implementation 'org.apache.poi:poi-ooxml:5.2.5'

    // Test
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

war {
    archiveFileName = 'MyCosmeticShop.war'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

test {
    useJUnitPlatform()
}

remotes {
    host {
        host = System.getenv("DEPLOY_HOST") ?: "127.0.0.1"
        user = System.getenv("DEPLOY_USER") ?: ""
        password = System.getenv("DEPLOY_PASSWORD") ?: ""
    }
}

ssh.settings {
    knownHosts = allowAnyHosts
}

tasks.register('docker_deploy') {
    dependsOn 'war'

    doLast {
        ssh.run {
            session(remotes.host) {
                put from: "${project.projectDir}/build/libs/MyCosmeticShop.war",
                        into: "/usr/deploy/MyCosmeticShop.war"

                execute "echo '${remotes.host.password}' | sudo -S docker rm -f tomcat10 || true"
                execute "echo '${remotes.host.password}' | sudo -S docker run -d --name tomcat10 -v /usr/deploy:/usr/local/tomcat/webapps -p 80:8080 tomcat:10.1"
            }
        }
    }
}
